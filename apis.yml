aid: websockets
name: WebSockets
description: >-
  WebSockets is a communication protocol providing full-duplex communication
  channels over a single TCP connection, enabling real-time data exchange
  between client and server. It is fundamental to modern network architectures
  and enables reliable bidirectional communication between systems.
